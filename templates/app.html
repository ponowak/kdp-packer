<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Backend Keywords | Aplikacja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { cream: { 50: '#fcfcf9', 100: '#f7f5ee', 200: '#e6dfce', DEFAULT: '#f7f5ee' }, navy: { 800: '#23395d', 900: '#152238', DEFAULT: '#152238' }, kdp_red: { 600: '#cc2936', 700: '#a8202b', DEFAULT: '#cc2936' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-cream-100 font-sans text-navy-900 min-h-screen">
    <!-- Pasek Nawigacji -->
    <nav class="bg-white border-b border-cream-200 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="font-serif font-bold text-xl tracking-tight text-center sm:text-left w-full sm:w-auto">
            7-Backend<span class="text-kdp_red-600">.</span>Keywords
        </div>
        <div class="flex items-center gap-4 flex-wrap justify-center sm:justify-end w-full sm:w-auto">
            <div class="bg-cream-100 px-4 py-1.5 rounded-full text-sm font-medium border border-cream-200">
                Tokeny: <span id="credit-count" class="font-bold text-kdp_red-600">{{ credits }}</span>
            </div>
            <a href="https://7backend.lemonsqueezy.com/checkout/buy/c849be9a-661b-4b1c-844f-10e88367d7d3" target="_blank" class="text-xs sm:text-sm font-bold text-kdp_red-600 border border-kdp_red-600 px-3 py-1.5 rounded hover:bg-kdp_red-600 hover:text-white transition-colors">
                Kup Tokeny
            </a>
            <!-- Na tel ikonka drzwi, na PC email -->
            <a href="/logout" class="text-sm text-navy-800/60 hover:text-navy-900 font-medium">
                <span class="hidden sm:inline">Wyloguj ({{ email }})</span>
                <span class="sm:hidden font-bold underline">Wyloguj</span>
            </a>
        </div>
    </nav>

    <!-- Główna zawartość -->
    <main class="max-w-4xl mx-auto mt-6 sm:mt-10 px-4 sm:px-6 mb-20">
        <div class="bg-white p-6 sm:p-8 rounded-xl shadow-sm border border-cream-200">
            <h2 class="font-serif text-xl sm:text-2xl font-bold mb-4">Wpisz tytuł i podtytuł, wybierz język.</h2>
            
            <!-- Flagi Językowe BARDZO PROSTE I ZAWSZE KOLOROWE -->
            <div class="mb-6 bg-cream-50 p-4 rounded-lg border border-cream-200">
                <label class="block text-sm font-medium text-navy-800/70 mb-3 uppercase tracking-wider">Wybierz język docelowy:</label>
                <div class="flex flex-wrap gap-4" id="flag-container">
                    
                    <div class="flag-wrapper cursor-pointer border-4 border-kdp_red-600 rounded shadow-md transform scale-110" data-lang="en-US">
                        <img src="https://flagcdn.com/w40/us.png" alt="USA" class="w-10 h-auto block" title="Angielski (USA)">
                    </div>
                    
                    <div class="flag-wrapper cursor-pointer border-4 border-transparent hover:border-cream-200 rounded" data-lang="en-GB">
                        <img src="https://flagcdn.com/w40/gb.png" alt="UK" class="w-10 h-auto block" title="Angielski (UK)">
                    </div>
                    
                    <div class="flag-wrapper cursor-pointer border-4 border-transparent hover:border-cream-200 rounded" data-lang="de">
                        <img src="https://flagcdn.com/w40/de.png" alt="DE" class="w-10 h-auto block" title="Niemiecki">
                    </div>
                    
                    <div class="flag-wrapper cursor-pointer border-4 border-transparent hover:border-cream-200 rounded" data-lang="fr">
                        <img src="https://flagcdn.com/w40/fr.png" alt="FR" class="w-10 h-auto block" title="Francuski">
                    </div>
                    
                    <div class="flag-wrapper cursor-pointer border-4 border-transparent hover:border-cream-200 rounded" data-lang="it">
                        <img src="https://flagcdn.com/w40/it.png" alt="IT" class="w-10 h-auto block" title="Włoski">
                    </div>
                    
                    <div class="flag-wrapper cursor-pointer border-4 border-transparent hover:border-cream-200 rounded" data-lang="es">
                        <img src="https://flagcdn.com/w40/es.png" alt="ES" class="w-10 h-auto block" title="Hiszpański">
                    </div>
                    
                    <div class="flag-wrapper cursor-pointer border-4 border-transparent hover:border-cream-200 rounded" data-lang="pl">
                        <img src="https://flagcdn.com/w40/pl.png" alt="PL" class="w-10 h-auto block" title="Polski">
                    </div>

                </div>
            </div>

            <!-- Pola -->
            <div class="grid sm:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-navy-800/70 mb-2 uppercase tracking-wider" id="title-label">Tytuł Książki</label>
                    <input type="text" id="title-input" class="w-full p-4 border border-cream-200 rounded-md focus:ring-2 focus:ring-kdp_red-600 focus:outline-none text-sm shadow-inner transition-colors" placeholder="np. Coloring Book for Adults">
                </div>
                <div>
                    <label class="block text-xs font-bold text-navy-800/70 mb-2 uppercase tracking-wider">Podtytuł (Opcjonalnie)</label>
                    <input type="text" id="subtitle-input" class="w-full p-4 border border-cream-200 rounded-md focus:ring-2 focus:ring-kdp_red-600 focus:outline-none text-sm shadow-inner" placeholder="np. 50 Stress Relieving Mandalas">
                </div>
            </div>
            
            <button onclick="processKeywords()" id="process-btn" class="w-full sm:w-auto bg-kdp_red-600 text-white px-8 py-3 rounded-md font-semibold hover:bg-kdp_red-700 transition-colors shadow-md disabled:opacity-50 tracking-wide">
                WYGENERUJ
            </button>
            
            <div id="error-msg" class="hidden mt-4 text-red-600 text-sm font-medium"></div>
        </div>

        <div id="results-container" class="hidden mt-8 space-y-6">
            <div class="bg-white p-6 sm:p-8 rounded-xl shadow-sm border border-cream-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-serif text-xl font-bold">Twoje 7 okienek KDP:</h3>
                    <button onclick="downloadTxt()" class="bg-navy-900 text-white px-4 py-2 rounded-md font-medium hover:bg-navy-800 transition-colors shadow-sm text-xs sm:text-sm">
                        Pobierz plik .txt
                    </button>
                </div>
                <div id="boxes-list" class="space-y-3 font-mono text-sm bg-cream-50 p-4 sm:p-6 rounded border border-cream-200">
                </div>
            </div>

            <div class="bg-white p-6 sm:p-8 rounded-xl shadow-sm border border-cream-200 opacity-60 hover:opacity-100 transition-opacity">
                <h3 class="font-serif text-base font-bold mb-2 text-navy-800/80">Oryginalna baza słów (Raw AI Output):</h3>
                <textarea id="raw-text" rows="3" readonly class="w-full p-3 border border-cream-200 rounded-md bg-cream-50 text-xs font-mono text-navy-800/70"></textarea>
            </div>
        </div>
    </main>

    <script>
        let currentLanguage = 'en-US';
        let currentBoxes = [];
        
        function resetUI() {
            const btn = document.getElementById('process-btn');
            btn.disabled = false;
            btn.innerText = "WYGENERUJ";
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('title-input').classList.remove('border-red-500', 'ring-red-500');
            document.getElementById('title-label').classList.remove('text-red-500');
        }

        document.getElementById('title-input').addEventListener('input', resetUI);
        document.getElementById('subtitle-input').addEventListener('input', resetUI);
        
        // NOWY, PANCERNY KOD ZAZNACZANIA FLAGI (BEZ SZAROŚCI, SAMA RAMKA)
        document.querySelectorAll('.flag-wrapper').forEach(wrapper => {
            wrapper.addEventListener('click', function() {
                resetUI();
                
                // Usuń czerwoną ramkę i powiększenie ze wszystkich flag
                document.querySelectorAll('.flag-wrapper').forEach(w => {
                    w.classList.remove('border-kdp_red-600', 'transform', 'scale-110', 'shadow-md');
                    w.classList.add('border-transparent');
                });
                
                // Dodaj czerwoną ramkę i powiększenie do klikniętej flagi
                this.classList.remove('border-transparent');
                this.classList.add('border-kdp_red-600', 'transform', 'scale-110', 'shadow-md');
                
                // Zapisz język
                currentLanguage = this.getAttribute('data-lang');
            });
        });
        
        function copyBox(index) {
            const textToCopy = currentBoxes[index];
            navigator.clipboard.writeText(textToCopy).then(() => {
                const copyBtn = document.getElementById(`copy-btn-${index}`);
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Skopiowano!";
                copyBtn.classList.add('bg-green-600', 'text-white', 'border-green-600');
                copyBtn.classList.remove('text-navy-900', 'border-cream-200');
                
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.classList.remove('bg-green-600', 'text-white', 'border-green-600');
                    copyBtn.classList.add('text-navy-900', 'border-cream-200');
                }, 2000);
            });
        }
        
        async function processKeywords() {
            const btn = document.getElementById('process-btn');
            const errorMsg = document.getElementById('error-msg');
            const titleInput = document.getElementById('title-input');
            const titleLabel = document.getElementById('title-label');
            const title = titleInput.value;
            const subtitle = document.getElementById('subtitle-input').value;
            
            if(!title.trim()) {
                titleInput.classList.add('border-red-500', 'ring-red-500');
                titleLabel.classList.add('text-red-500');
                errorMsg.innerText = "Podaj przynajmniej tytuł książki!";
                errorMsg.classList.remove('hidden');
                return;
            }
            
            btn.disabled = true;
            btn.innerText = "Trwa Generowanie AI...";
            errorMsg.classList.add('hidden');
            
            try {
                const response = await fetch('/api/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, subtitle: subtitle, language: currentLanguage })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    errorMsg.innerText = data.error || "Wystąpił nieznany błąd";
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "WYGENERUJ";
                    return;
                }
                
                if(document.getElementById('credit-count')) {
                    document.getElementById('credit-count').innerText = data.remaining_credits;
                }
                
                if(document.getElementById('raw-text') && data.raw_text) {
                    document.getElementById('raw-text').value = data.raw_text;
                }
                
                currentBoxes = data.boxes || [];
                const list = document.getElementById('boxes-list');
                if(list) {
                    list.innerHTML = '';
                    currentBoxes.forEach((box, index) => {
                        const div = document.createElement('div');
                        div.className = "flex justify-between items-center border-b border-cream-200 pb-2 last:border-0 last:pb-0";
                        
                        div.innerHTML = `
                            <div class="pr-4">
                                <span class="text-kdp_red-600 font-bold mr-2">Box ${index + 1}:</span> 
                                <span>${box}</span> 
                                <span class="text-gray-400 text-xs ml-2 font-bold tracking-wider">${box.length}/50</span>
                            </div>
                            <button id="copy-btn-${index}" onclick="copyBox(${index})" class="text-xs font-bold uppercase tracking-wider text-navy-900 border border-cream-200 px-3 py-1.5 rounded hover:bg-cream-200 transition-colors whitespace-nowrap">
                                Kopiuj
                            </button>
                        `;
                        list.appendChild(div);
                    });
                }
                
                const resultsContainer = document.getElementById('results-container');
                if(resultsContainer) {
                    resultsContainer.classList.remove('hidden');
                }
                
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Wystąpił krytyczny błąd połączenia z serwerem.";
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "WYGENERUJ";
            }
        }
        
        function downloadTxt() {
            if (currentBoxes.length === 0) return;
            const text = currentBoxes.join('\n');
            const blob = new Blob([text], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '7backend-keywords.txt';
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
